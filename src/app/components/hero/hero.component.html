<section class="hero" #heroSection>
  <div class="hero__grid"></div>
  <div class="hero__glow hero__glow--cyan"></div>
  <div class="hero__glow hero__glow--magenta"></div>
  <div class="hero__noise"></div>

  <div class="hero__content">
    <div class="hero__label">
      <span class="hero__label-line"></span>
      <span class="hero__label-text">PORTFOLIO :: 2026</span>
      <span class="hero__label-line"></span>
    </div>

    <h1 class="hero__name" data-text="АЛИНА">
      <span class="hero__name-main">АЛИНА</span>
    </h1>

    <div class="hero__role">
      <span class="hero__role-bracket">[</span>
      <span class="hero__role-text">Middle Frontend Developer</span>
      <span class="hero__role-highlight">Angular</span>
      <span class="hero__role-bracket">]</span>
    </div>

    <p class="hero__tagline">
      <span class="hero__tagline-marker">//</span>
      3 года в разработке. От первой строки кода до production-ready приложений.
    </p>

    <div class="hero__stats">
      <div class="hero__stat">
        <span class="hero__stat-value">3+</span>
        <span class="hero__stat-label">года опыта</span>
      </div>
      <div class="hero__stat-divider"></div>
      <div class="hero__stat">
        <span class="hero__stat-value">10+</span>
        <span class="hero__stat-label">проектов</span>
      </div>
      <div class="hero__stat-divider"></div>
      <div class="hero__stat">
        <span class="hero__stat-value">Angular</span>
        <span class="hero__stat-label">основной стек</span>
      </div>
    </div>
  </div>

  <div class="hero__scroll">
    <div class="hero__scroll-line"></div>
    <span class="hero__scroll-text">SCROLL</span>
  </div>

  <div class="hero__corner hero__corner--tl"></div>
  <div class="hero__corner hero__corner--tr"></div>
  <div class="hero__corner hero__corner--bl"></div>
  <div class="hero__corner hero__corner--br"></div>
</section>
